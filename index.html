      h("div",{style:{fontSize:"10px",color:"#3a2a14",fontWeight:"700",marginBottom:"4px",marginTop:"8px"}},
        L==="cs"?"Herní systémy v4.2:":"Game systems v4.2:"),
      h("div",{style:{fontSize:"10px",color:"#8b5e34",lineHeight:"1.9"}},
        "🗓️ "+(L==="cs"?"12 kol · 5 příprava · 7 kampaň":"12 rounds · 5 prep · 7 campaign"),h("br",null),
        "🔥 "+(L==="cs"?"Dynamická pec — zaběhnutost, šamot, 3 typy":"Dynamic furnace — run-in, shamot, 3 types"),h("br",null),
        "🌲 "+(L==="cs"?"Hvozd — konečný zdroj, zalesňování":"Forest — finite resource, reforestation"),h("br",null),
        "🏺 "+(L==="cs"?"Výroba pánví — stárnutí, kvalita":"Crucible system — aging, quality"),h("br",null),
        "🎨 "+(L==="cs"?"Barevné sklo — 4 receptury (Neri 1612, Kunckel 1679)":"Coloured glass — 4 recipes (Neri 1612, Kunckel 1679)"),h("br",null),
        "👷 "+(L==="cs"?"7 NPC dělníků · 12 traitů · apprenticeship XP":"7 NPC workers · 12 traits · apprenticeship XP"),h("br",null),
        "🍺 "+(L==="cs"?"Pivovar · pivo jako naturální mzda · hutní privilegium":"Brewery · beer as wage · foundry privilege"),h("br",null),
        "📜 "+(L==="cs"?"Kronika · humorné příhody · alchymistické citáty":"Chronicle · humorous events · alchemical quotes"),h("br",null),
        "🗣️ "+(L==="cs"?"Baranovský — obchodník s přísadami · progression barev":"Baranovský — additives trader · colour progression")),
      // Autorství
      h("div",{style:{marginTop:"10px",paddingTop:"8px",borderTop:"1px solid rgba(42,26,10,.1)",
        fontSize:"11px",color:"#8b5e34",lineHeight:"1.8"}},
        h("div",{style:{fontWeight:"700",color:"#3a2a14",marginBottom:"4px"}},
          L==="cs"?"Tvůrce & konzultace":"Creator & Consultation"),
        h("div",null,"Ondřej Panuška — design, kód, herní mechaniky"),
        h("div",null,L==="cs"?"Jaromír Panuška - tatínek — historická a technologická konzultace (technolog skla)":"Father — historical & technical consultation (glass technologist)"),
        h("a",{href:"mailto:ondrej.panuska@gmail.com",style:{color:"#c9952b"}},
          "ondrej.panuska@gmail.com")),
      // Poděkování
      h("div",{style:{marginTop:"8px",fontSize:"10px",color:"#8b5e34",lineHeight:"1.6",
        fontStyle:"italic",borderTop:"1px solid rgba(42,26,10,.1)",paddingTop:"8px"}},
        L==="cs"
          ?"Hra čerpá z Kunckelovy Ars Vitraria Experimentalis (1743), Neriho L'Arte Vetraria (1612) a dobových sklářských privilegií severních Čech."
          :"The game draws on Kunckel's Ars Vitraria Experimentalis (1743), Neri's L'Arte Vetraria (1612) and period glassmaking privileges of northern Bohemia."),
      // Footer
      h("div",{style:{marginTop:"12px",paddingTop:"10px",borderTop:"1px solid rgba(42,26,10,.15)",
        fontSize:"10px",color:"#8b5e34",lineHeight:"2",textAlign:"center"}},
        h("div",null,
          h("span",null,"🔥 "),h("a",{href:"https://ember-pa.cz/",style:{color:"#c9952b"}},"Ember PA"),
          h("span",null," · 📜 "),h("a",{href:"https://myscriptorium.cz/",style:{color:"#c9952b"}},"Scriptorium"),
		  h("span",null," · 📰 "),h("a",{href:"https://newsandradio.cz",style:{color:"#c9952b"}},"Jouza News&Radio 📻"),
		  h("span",null," · ⛧ "),h("a",{href:"https://occultix.app",style:{color:"#c9952b"}},"Occultix"),
		  h("span",null," · 🧩 "),h("a",{href:"https://fractout.com/",style:{color:"#c9952b"}},"Fractout"),
          h("span",null," · 🔮 "),h("a",{href:"https://oracoolio.com",style:{color:"#c9952b"}},"Oracoolio")),
        h("div",{style:{marginTop:"4px",fontSize:"10px",color:"#aaa"}},
          `Vyvíjeno s ❤️ v Novém Boru · Ondrex · v4.2 · ${new Date().getFullYear()}`),
        h("div",{style:{marginTop:"8px"}},
          h("a",{href:"/about.html",target:"_blank",style:{fontSize:"11px",color:"#c9952b",textDecoration:"none",letterSpacing:"0.5px"}},
            "📖 "+(L==="cs"?"O hře — about.html →":"About the game →")))));
    content.append(iSec);
  }

  app.append(content);
  // Obnovit scroll pozici po překreslení
  if(_scrollTop>0){
    const _newContent=app.querySelector(".content");
    if(_newContent)_newContent.scrollTop=_scrollTop;
  }
  const actionLabel=p.round>=ROUNDS-1
    ?(L==="cs"?"Uzavřít sezónu →":"End Season →")
    :(L==="cs"?`${ms[(p.round+1)%ROUNDS]} — Další měsíc →`:`${ms[(p.round+1)%ROUNDS]} — Next Month →`);
  const actionBar=h("div",{class:"action-bar"},
    h("button",{class:"btn btn-p",style:{width:"100%",padding:"11px",fontSize:"14px",letterSpacing:".5px"},
      onClick:processRound},actionLabel));

  // Sestav layout — desktop: tabs vlevo + content vpravo, mobil: stack
  if(isDesktop){
    app.classList.add("desktop");
    const contentShell=h("div",{class:"content-shell"});
    contentShell.append(content,actionBar);
    const shell=h("div",{class:"desktop-shell"});
    shell.append(tabBar,contentShell);
    app.append(shell);
  }else{
    app.classList.remove("desktop");
    app.append(tabBar,content,actionBar);
  }

  // Welcome modal — jednorázový po prvním vstupu
  if(p.phase==="playing" && p.firstVisit){
    const wModal=h("div",{class:"modal-bg"},
      h("div",{class:"modal",onClick:e=>e.stopPropagation(),style:{maxWidth:"340px"}},
        h("div",{style:{textAlign:"center",marginBottom:"10px",fontSize:"20px"}},"🔥"),
        h("h3",{style:{margin:"0 0 4px",fontSize:"15px",textAlign:"center"}},
          L==="cs"?"Vítej na huti":"Welcome to the Foundry"),
        h("div",{style:{fontSize:"11px",fontStyle:"italic",color:"#8b5e34",textAlign:"center",
          marginBottom:"12px",letterSpacing:"0.3px"}},
          "\u201eIgnis mutat res.\u201c"),
        h("div",{style:{fontSize:"12px",lineHeight:"1.7",marginBottom:"10px",color:"#3a2a14"}},
          L==="cs"
            ?"Máš pec, dluhy a hvozd kolem dokola. Každá sezóna má dvě fáze:"
            :"You have a furnace, debts, and forest all around. Each season has two phases:"),
        h("div",{style:{fontSize:"11px",lineHeight:"1.6",background:"rgba(0,0,0,.04)",
          borderRadius:"4px",padding:"8px 10px",marginBottom:"8px"}},
          h("div",{style:{marginBottom:"4px"}},
            L==="cs"?"🌿 Příprava (Listopad–Březen): kácej dřevo, vypal potaš, vyrob pánve."
                    :"🌿 Prep (Nov–Mar): log wood, burn potash, make crucibles."),
          h("div",null,
            L==="cs"?"🔥 Kampaň (Duben–Říjen): pec hoří, taví, prodávej na trhu."
                    :"🔥 Campaign (Apr–Oct): furnace burns, smelt, sell at market.")),
        h("div",{style:{fontSize:"11px",lineHeight:"1.6",marginBottom:"12px",color:"#5a3a1a"}},
          L==="cs"
            ?"Přiděluj dřevo na záložce Přehled (palivo / potaš / stavba). V kampani nastav Palivo na 100 % — bez dřeva pec nevyhřeješ."
            :"Allocate wood in Overview tab (fuel / potash / build). In campaign set Fuel to 100% — without wood the furnace won't heat."),
        h("button",{class:"btn btn-p",style:{width:"100%"},
          onClick:()=>{G.firstVisit=false;render();}},
          "OK — Vstoupit do hutě")));
    app.append(wModal);
  }

  // Help modal
  if(p.help){
    const helpText=L==="cs"
      ?"4 kola přípravy (březen–září): kácej, zásobuj, vyrob pánve. 5 kol kampaně (říjen–únor): pec běží, taví, prodávej. Pec se zaběhává → roste účinnost → lepší sklo. Šamot degraduje → oprav v mezisezóně. Les pomalu dorůstá. Hra nemá konec — buduj sezónu za sezónou."
      :"4 prep rounds (Mar–Sep): log, stockpile, make crucibles. 5 campaign rounds (Oct–Feb): furnace runs, smelt, sell. Furnace runs in → efficiency grows → better glass. Shamot degrades → repair between seasons. Forest slowly regrows. No end — build season by season.";
    const modal=h("div",{class:"modal-bg",onClick:()=>{G.help=false;render();}},
      h("div",{class:"modal",onClick:e=>e.stopPropagation()},
        h("h3",{style:{margin:"0 0 8px",fontSize:"16px"}},L==="cs"?"Nápověda v4":"Help v4"),
        h("p",{style:{fontSize:"12px",lineHeight:"1.6",marginBottom:"12px"}},helpText),
        h("div",{style:{fontSize:"11px",color:"#8b5e34",marginBottom:"4px"}},"🔥 Waldglas: 3🏖️ + 2🌿 + 1🪨 + 1💧 + 🏺"),
        h("div",{style:{fontSize:"11px",color:"#8b5e34",marginBottom:"4px"}},"🏺 Pánev: 2🧱 + 1🍞 (zraje 3 kola, kvalita závisí na pánvaři)"),
        h("div",{style:{fontSize:"11px",color:"#3a6a9a",marginBottom:"4px"}},"✨ Křišťál: 3✨ + 2🌿r + 1🪨 + 1⚫ (min 65% teplota)"),
        h("div",{style:{fontSize:"11px",color:"#c9952b",marginBottom:"12px"}},"🔥 Účinnost pece = zaběhnutost + kvalita pánve + stav šamotu"),
        h("div",{style:{textAlign:"right",marginTop:"8px"}},
          h("a",{href:"/about.html",target:"_blank",style:{fontSize:"11px",color:"#c9952b",textDecoration:"none"}},
            "📖 "+(L==="cs"?"Více o hře →":"More about the game →"))),
        h("button",{class:"btn btn-p",onClick:()=>{G.help=false;render();}},"OK")));
    app.append(modal);
  }
}

// ── INIT ──
G=initState();
try{
  const saved=localStorage.getItem("sh_v9");
  if(saved){
    const parsed=JSON.parse(saved);
    if(parsed&&parsed.season){Object.assign(G,parsed);}
  }
}catch(e){}
render();

// ── PWA INSTALL PROMPT ──────────────────────────────────────
let _installPrompt=null;
let _installBanner=null;

window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();
  _installPrompt=e;
  showInstallBanner();
});

function showInstallBanner(){
  if(_installBanner||!_installPrompt)return;
  // Nezobrazovat pokud už je nainstalováno
  if(window.matchMedia("(display-mode: standalone)").matches)return;

  _installBanner=document.createElement("div");
  _installBanner.style.cssText=`
    position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
    background:linear-gradient(145deg,#3a2510,#2a1608);
    color:#f0deb8;border-radius:8px;padding:12px 16px;
    display:flex;align-items:center;gap:12px;
    box-shadow:0 4px 20px rgba(0,0,0,.5);
    border:1px solid rgba(201,149,43,.3);
    font-family:'Palatino Linotype','Book Antiqua',Georgia,serif;
    font-size:13px;z-index:9999;max-width:340px;width:calc(100% - 32px);
  `;
  _installBanner.innerHTML=`
    <span style="font-size:24px">🏺</span>
    <div style="flex:1">
      <div style="font-weight:700;font-size:12px;color:#c9952b;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px">Sklářská Huť</div>
      <div style="font-size:11px;opacity:.8">Přidat na plochu — hrát offline</div>
    </div>
    <button id="pwa-install-btn" style="
      background:linear-gradient(180deg,#c9952b,#8b5e34);
      color:#f0deb8;border:none;border-radius:4px;
      padding:6px 12px;cursor:pointer;font-size:12px;font-weight:700;
      font-family:inherit;white-space:nowrap;
    ">Přidat</button>
    <button id="pwa-dismiss-btn" style="
      background:none;border:none;color:rgba(240,222,184,.4);
      cursor:pointer;font-size:18px;padding:0 4px;line-height:1;
    ">×</button>
  `;
  document.body.appendChild(_installBanner);

  document.getElementById("pwa-install-btn").onclick=async()=>{
    if(!_installPrompt)return;
    _installPrompt.prompt();
    const result=await _installPrompt.userChoice;
    _installPrompt=null;
    _installBanner.remove();
    _installBanner=null;
  };
  document.getElementById("pwa-dismiss-btn").onclick=()=>{
    _installBanner.remove();
    _installBanner=null;
    // Schovat na 24h
    localStorage.setItem("sh_pwa_dismissed",Date.now());
  };
}

// Zkontroluj jestli nebylo nedávno zamítnuto
window.addEventListener("load",()=>{
  const dismissed=localStorage.getItem("sh_pwa_dismissed");
  if(dismissed&&Date.now()-parseInt(dismissed)<86400000)return;
  // Banner se zobrazí automaticky přes beforeinstallprompt
});

window.addEventListener("appinstalled",()=>{
  if(_installBanner){_installBanner.remove();_installBanner=null;}
  _installPrompt=null;
});
</script>
