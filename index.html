<style>
:root{
  --bg:#0a0604;--card:#f4e4c1;--card2:#e8d5a3;--ink:#3a2a14;
  --warm:#8b5e34;--gold:#c9952b;--danger:#a03020;--ok:#4a7a3a;
  --blue:#3a6a9a;--light:#f0deb8;--border:#2a1a0a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:linear-gradient(180deg,#1a1408,var(--bg));color:var(--ink);
  font-family:'Palatino Linotype','Book Antiqua',Georgia,serif;
  display:flex;justify-content:center;padding:8px;min-height:100vh;}
#app{background:linear-gradient(145deg,var(--card),var(--card2),var(--light),#e2c990);
  border-radius:6px;box-shadow:0 4px 24px rgba(0,0,0,.5);max-width:560px;width:100%;
  overflow:hidden;display:flex;flex-direction:column;max-height:100vh;}
.hdr{background:linear-gradient(135deg,#5a3a1a,#3a2510);color:var(--light);
  padding:10px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.hdr h1{font-size:14px;font-weight:700;margin:0;}
.hdr small{font-size:10px;opacity:.7;}
.sec{padding:10px 14px;border-bottom:1px solid rgba(42,26,10,.13);}
.sec-title{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--warm);font-weight:700;margin-bottom:5px;}
.btn{padding:6px 12px;border-radius:4px;border:1px solid var(--warm);
  background:linear-gradient(180deg,var(--card),#dcc690);color:var(--ink);
  cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;}
.btn:hover{filter:brightness(1.05);}
.btn-p{background:linear-gradient(180deg,var(--warm),#6b4520);color:var(--light);border-color:#4a3015;}
.btn-s{padding:3px 8px;font-size:11px;}
.btn-active{background:var(--warm)!important;color:var(--light)!important;border-color:transparent!important;}
.btn-danger{background:linear-gradient(180deg,#a03020,#701a10);color:var(--light);border-color:#4a1a0a;}
.pill{display:inline-flex;align-items:center;gap:2px;padding:1px 5px;border-radius:10px;
  font-size:10px;font-weight:700;background:rgba(139,94,52,.1);border:1px solid rgba(139,94,52,.15);}
.pill.warn{background:rgba(160,48,32,.15);color:var(--danger);border-color:rgba(160,48,32,.2);}
.pill.ok{background:rgba(74,122,58,.15);color:var(--ok);border-color:rgba(74,122,58,.2);}
.bar-track{width:100%;height:8px;background:rgba(0,0,0,.12);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .3s;}
.tabs{display:flex;gap:1px;padding:0 10px;border-bottom:1px solid rgba(42,26,10,.13);
  background:rgba(0,0,0,.02);flex-shrink:0;overflow-x:auto;}
.tab{padding:6px 10px;font-size:11px;font-weight:500;color:var(--warm);background:none;
  border:none;border-radius:4px 4px 0 0;cursor:pointer;font-family:inherit;white-space:nowrap;}
.tab.active{font-weight:700;color:var(--light);background:var(--warm);}
.content{flex:1;overflow:auto;min-height:180px;}
.action-bar{padding:10px 14px;border-top:1px solid rgba(42,26,10,.2);flex-shrink:0;}
.round-bar{display:flex;flex-direction:column;padding:4px 14px;
  background:rgba(0,0,0,.03);border-bottom:1px solid rgba(42,26,10,.13);flex-shrink:0;}
.round-bar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;font-size:11px;}
.round-pip{width:22px;height:20px;border-radius:3px;display:flex;align-items:center;
  justify-content:center;font-size:8px;flex-shrink:0;}
.res-bar{display:flex;flex-direction:column;gap:2px;padding:5px 14px;
  border-bottom:1px solid rgba(42,26,10,.13);flex-shrink:0;}
.pill-row{display:flex;flex-wrap:nowrap;gap:3px;align-items:center;}
.pill-sep{color:rgba(42,26,10,.25);font-size:11px;padding:0 2px;flex-shrink:0;}
.pill-primary .pill{padding:2px 7px;font-size:11px;}
#app.desktop .res-bar{flex-direction:row;align-items:center;flex-wrap:nowrap;}
#app.desktop .pill-row{flex-wrap:nowrap;}
#app.desktop .pill-row+.pill-row{margin-left:0;}
.worker-card{margin-bottom:8px;padding:6px;background:rgba(0,0,0,.02);border-radius:4px;}
.worker-name{font-size:12px;font-weight:700;margin-bottom:3px;}
.task-btns{display:flex;flex-wrap:wrap;gap:2px;}
.alloc-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:12px;}
.alloc-row span:first-child{width:100px;}
.alloc-row input[type=range]{flex:1;height:4px;accent-color:var(--warm);}
.alloc-row strong{width:30px;text-align:right;}
.log-box{max-height:280px;overflow:auto;font-size:11px;line-height:1.5;
  font-family:'Courier New',monospace;padding:6px;background:rgba(0,0,0,.03);border-radius:4px;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;
  align-items:center;justify-content:center;z-index:100;padding:16px;}
.modal{background:linear-gradient(145deg,var(--card),var(--card2));border-radius:6px;
  max-width:440px;width:100%;padding:18px;max-height:80vh;overflow:auto;
  box-shadow:0 4px 24px rgba(0,0,0,.5);}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.stars{letter-spacing:-1px;font-size:12px;}
.hint-box{padding:6px 8px;background:rgba(0,0,0,.03);border-radius:4px;font-size:12px;
  line-height:1.5;margin-bottom:8px;}
.temp-bar{display:flex;gap:2px;margin-bottom:4px;}
.temp-seg{flex:1;height:12px;border-radius:2px;transition:all .3s;}
.furnace-card{background:rgba(0,0,0,.03);border-radius:4px;padding:8px;margin-bottom:6px;}
.furnace-stat{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;}
.interseason-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.interseason-card{padding:8px;background:rgba(0,0,0,.04);border-radius:4px;font-size:12px;}
.season-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}
.eff-bar{height:6px;border-radius:3px;background:rgba(0,0,0,.1);overflow:hidden;margin-top:3px;}
.eff-fill{height:100%;border-radius:3px;transition:width .4s;}
.fat-bar{height:4px;border-radius:2px;background:rgba(0,0,0,.08);overflow:hidden;margin-top:2px;}
.fat-fill{height:100%;border-radius:2px;transition:width .3s;}
.settings-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(42,26,10,.08);}
.settings-row:last-child{border-bottom:none;}
.settings-label{font-size:12px;color:var(--ink);flex:1;}
.settings-val{font-size:11px;color:var(--warm);width:36px;text-align:right;}
/* Tooltip */
.tip-wrap{position:relative;display:inline-flex;}
.tip-wrap .tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:#2a1608;color:#f0deb8;font-size:11px;padding:5px 9px;border-radius:4px;
  white-space:nowrap;z-index:50;border:1px solid #8b5e34;pointer-events:none;line-height:1.4;
  font-family:'Palatino Linotype',Georgia,serif;}
.tip-wrap:hover .tip,.tip-wrap.open .tip{display:block;}
/* Sezónní kontext panel */
.season-panel{padding:8px 14px;border-bottom:1px solid rgba(42,26,10,.15);flex-shrink:0;
  background:linear-gradient(135deg,rgba(139,94,52,.08),rgba(201,149,43,.05));}
.season-panel-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.season-icon{font-size:20px;flex-shrink:0;}
.season-phase{font-size:11px;font-weight:700;color:var(--warm);text-transform:uppercase;letter-spacing:.8px;}
.season-priority{font-size:12px;color:var(--ink);line-height:1.4;font-style:italic;}
.season-tip{font-size:11px;color:#6a4a28;margin-top:2px;line-height:1.4;}
.season-trh{font-size:10px;margin-top:3px;font-weight:700;}
/* Pec dashboard */
.furnace-dash{background:#1a0e06;border-radius:6px;padding:12px;margin-bottom:8px;color:#f0deb8;}
.furnace-temp-gauge{display:flex;align-items:flex-end;gap:3px;height:60px;margin-bottom:8px;}
.gauge-bar{flex:1;border-radius:2px 2px 0 0;transition:height .5s,background .5s;}
.furnace-readout{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.furn-stat{background:rgba(255,255,255,.05);border-radius:4px;padding:6px 8px;}
.furn-stat-label{font-size:9px;color:#8b5e34;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;}
.furn-stat-val{font-size:16px;font-weight:700;}
.shamot-visual{display:flex;gap:2px;margin-top:4px;}
.shamot-brick{flex:1;height:10px;border-radius:2px;transition:background .4s;}
/* ── MELT / SKLOVINA ANIMATION ── */
.fire-stage{display:none;} /* legacy — not used */
@keyframes meltRot1{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes meltRot2{from{transform:rotate(0deg);}to{transform:rotate(-360deg);}}
@keyframes meltPulse{0%,100%{opacity:.55;}50%{opacity:1;}}
@keyframes bubbleRise{
  0%{transform:translateY(0) scale(1);opacity:.4;}
  70%{opacity:.3;}
  100%{transform:translateY(-38px) scale(1.6);opacity:0;}}
.furnace-hud{display:flex;align-items:center;gap:6px;padding:4px 14px;
  border-bottom:1px solid rgba(42,26,10,.13);flex-shrink:0;background:rgba(0,0,0,.02);}
.furnace-temp-big{font-size:22px;line-height:1;flex-shrink:0;}
.furnace-details{flex:1;min-width:0;}
.furnace-hud-row{display:flex;align-items:center;gap:4px;font-size:10px;color:#8b5e34;}
.toast-container{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  width:calc(100% - 32px);max-width:520px;z-index:200;pointer-events:none;}
.toast{background:linear-gradient(145deg,#3a2510,#2a1a08);color:var(--light);
  border-radius:6px;padding:10px 14px;font-size:12px;line-height:1.5;
  border-left:3px solid var(--gold);margin-top:6px;
  animation:toastIn .25s ease;font-family:'Palatino Linotype','Book Antiqua',Georgia,serif;}
.toast-title{font-weight:700;font-size:11px;color:var(--gold);margin-bottom:3px;
  text-transform:uppercase;letter-spacing:.8px;}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.log-entry{padding:6px 0;border-bottom:1px solid rgba(42,26,10,.07);font-size:12px;line-height:1.6;}
.log-entry:last-child{border-bottom:none;}
.log-season-hdr{font-size:13px;font-weight:700;color:var(--warm);margin:10px 0 4px;
  padding-bottom:4px;border-bottom:2px solid rgba(139,94,52,.2);}
@media(max-width:600px){body{padding:4px;}.hdr h1{font-size:12px;}}

/* ── DESKTOP LAYOUT — JS přidá .desktop na #app při ≥768px ── */
#app.desktop{max-width:1140px;max-height:calc(100vh - 16px);}
/* Taby — levý sidebar */
#app.desktop .tabs{
  flex-direction:column;width:140px;flex-shrink:0;
  border-bottom:none;border-right:1px solid rgba(42,26,10,.15);
  background:linear-gradient(180deg,rgba(0,0,0,.04),rgba(0,0,0,.02));
  overflow-x:visible;overflow-y:auto;padding:8px 0;gap:2px;}
#app.desktop .tab{
  border-radius:4px 0 0 4px;text-align:left;
  padding:9px 14px;font-size:12px;white-space:normal;
  border-right:3px solid transparent;}
#app.desktop .tab.active{
  border-radius:4px 0 0 4px;
  border-right:3px solid var(--gold);
  background:rgba(201,149,43,.12);color:var(--warm);}
/* Shell: tabs vlevo + content vpravo */
#app.desktop .desktop-shell{display:flex;flex:1;overflow:hidden;min-height:0;}
#app.desktop .content-shell{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0;}
#app.desktop .content{flex:1;overflow-y:auto;}
#app.desktop .action-bar{flex-shrink:0;}
/* Toast vpravo dole */
#app.desktop ~ #toastContainer,
.toast-container{left:auto;right:20px;transform:none;max-width:360px;}
/* Overview: sezóna + pec vedle sebe */
#app.desktop .overview-top-cols{display:grid;grid-template-columns:1fr 1fr;gap:0;
  border-bottom:1px solid rgba(42,26,10,.13);}
#app.desktop .overview-top-cols>.sec{border-bottom:none;border-right:1px solid rgba(42,26,10,.1);}
#app.desktop .overview-top-cols>.sec:last-child{border-right:none;}
/* Dělníci: 2 sloupce */
#app.desktop .workers-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 14px 10px;}
#app.desktop .workers-grid .worker-card{margin-bottom:0;}
/* Výroba: auto + custom ve 2 sloupcích */
#app.desktop .production-cols{display:grid;grid-template-columns:1fr 1fr;gap:0;}
#app.desktop .production-cols>.sec{border-bottom:none;border-right:1px solid rgba(42,26,10,.1);}
#app.desktop .production-cols>.sec:last-child{border-right:none;}
/* Pec tab: 3/1 split (dash / účinnost) */
#app.desktop .furnace-cols{display:grid;grid-template-columns:3fr 1fr;gap:0;border-bottom:1px solid rgba(42,26,10,.13);}
#app.desktop .furnace-cols>.sec{border-bottom:none;border-right:1px solid rgba(42,26,10,.1);}
#app.desktop .furnace-cols>.sec:last-child{border-right:none;}
/* Production tab: CSS columns na desktopu */
#app.desktop .content.prod-desktop{column-count:2;column-gap:0;column-rule:1px solid rgba(42,26,10,.1);}
#app.desktop .content.prod-desktop>.sec{break-inside:avoid;}
</style>

// Nákup parcel lesa — max 60, cena roste s počtem
function buyParcely(n){
  const cur=G.forest;
  const max=200;
  if(cur>=max){G.log.push(`__EVT__🌲 ${G.lang==="cs"?"Hvozd je na maximu (200 parcel)":"Forest at maximum (200 parcels)"}`);render();return;}
  const buy=Math.min(n,max-cur);
  const price=buy*8; // 8g/parcela
  if(G.grose<price){G.log.push(`__EVT__❌ ${G.lang==="cs"?"Nedostatek grošů":"Not enough groats"}`);render();return;}
  G.grose-=price;
  G.forest+=buy;
  G.forestMax=(G.forestMax||INIT_FOREST)+buy; // koupené parcely navyšují strop
  G.log.push(`__ECO__🌲 ${G.lang==="cs"?"Zakoupeno":"Bought"} ${buy} ${G.lang==="cs"?"parcel lesa":"forest parcels"} (-${price}g)`);
  render();
}

// Kteří NPC jsou k dispozici pro nábor (ještě ne v huti)
function getAvailableNPC(){
  const inHutte=(G?.workers||[]).map(w=>w.npcId).filter(Boolean);
  return NPC_ROSTER.filter(n=>!inHutte.includes(n.id));
}

function genCandidates(season, count){
  const available=getAvailableNPC().filter(n=>{
    const minSeason=n.availSeason!==undefined?n.availSeason:1;
    return season>=minSeason;
  });
  if(available.length===0)return [];
  // Zamíchej a vyber unikátní kandidáty (žádné duplikáty)
  const shuffled=[...available].sort(()=>Math.random()-.5);
  return shuffled.slice(0,Math.min(count,shuffled.length)).map(npc=>({
    id:"c"+npc.id, npcId:npc.id,
    name:npc.name, prof:npc.prof, lv:npc.lv,
    traits:npc.traits, hireCost:npc.hireCost, wageMod:npc.wageMod,
    portrait:npc.portrait,
    quote_cs:npc.quote_cs, quote_en:npc.quote_en,
    loyalty:npc.loyalty, health:npc.health, mood:npc.mood,
    gender:npc.gender||"m",
    xp:0, fat:0, task:WERKSTAT_PROFS.includes(npc.prof)?"werkstat":"idle"
  }));
}

function hireWorker(candidate){
  if(G.workers.length>=MAX_WORKERS||G.grose<candidate.hireCost)return;
  G.grose-=candidate.hireCost;
  G.workers.push({...candidate,id:"w"+Date.now()});
  G.interseason.candidates=G.interseason.candidates.filter(c=>c.id!==candidate.id);
  G.log.push(`__ECO__👷 ${candidate.name} ${G.lang==="cs"?"přijat do hutě":"hired"} (-${candidate.hireCost}g)`);
  render();
}

function fireWorker(workerId){
  if(G.workers.length<=2)return; // min 2 dělníci
  const w=G.workers.find(x=>x.id===workerId);
  if(!w||w.traits?.includes("houzevatny"))return;
  G.workers=G.workers.filter(x=>x.id!==workerId);
  G.log.push(`__ECO__👋 ${w.name} ${G.lang==="cs"?"odešel z hutě":"left the foundry"}`);
  render();
}

// Craft foukaného výrobku
function craftBlown(itemKey){
  const it=BLOWN_ITEMS[itemKey];
  if(!it)return;
  const p=G, L=p.lang;
  // Musí být kampaň + pec aktivní
  if(p.round<PREP||!p.fActive){
    G.log.push(`__EVT__⛔ ${L==="cs"?"Pec musí běžet (kampaň)":"Furnace must be running (campaign)"}`);
    render(); return;
  }
  // Musí být forma (pokud potřebuje)
  const needsForma=["dzban","misa","dzban_forma"].includes(itemKey);
  if(needsForma&&(p.res.formy||0)<1){
    G.log.push(`__EVT__⛔ ${L==="cs"?"Chybí forma (Formař musí vyrobit)":"No mould available (Formař must make one)"}`);
    render(); return;
  }
  // Vstupní surovina
  const inv=[...(p[it.input]||[])];
  if(inv.length<it.qty){
    G.log.push(`__EVT__⛔ ${L==="cs"?"Nedostatek suroviny":"Not enough input material"}: ${it.input}`);
    render(); return;
  }
  // Najít foukače v huti
  const specialists=p.workers.filter(w=>w.prof===it.spec);
  const anyBlower=p.workers.filter(w=>["foukat_lesni","foukat_kristal","foukat_dekor","foukat_formy"].includes(w.prof));
  // specOnly → potřeba specialista
  if(it.specOnly&&specialists.length===0){
    G.log.push(`__EVT__⛔ ${L==="cs"?"Vyžaduje specializovaného foukače":"Requires specialist glassblower"}: ${PROF_CS[it.spec]}`);
    render(); return;
  }
  if(!it.specOnly&&anyBlower.length===0){
    G.log.push(`__EVT__⛔ ${L==="cs"?"Žádný foukač v huti":"No glassblower in foundry"}`);
    render(); return;
  }
  // Spotřeba suroviny
  inv.sort((a,b)=>b-a);
  const used=inv.slice(0,it.qty);
  const avgQ=Math.round(used.reduce((s,q)=>s+q,0)/it.qty);
  G[it.input]=inv.slice(it.qty);
  if(needsForma)G.res.formy=Math.max(0,(G.res.formy||0)-1);
  // Kvalita: základ průměr vstupů, specialista ×bonus na kvalitu
  const isSpec=specialists.length>0;
  const specLv=isSpec?specialists[0].lv:1;
  const qBonus=isSpec?Math.round(specLv*0.8):0;
  const outQ=clamp(avgQ+qBonus+(Math.random()>.6?1:0),1,5);
  // Počet výstupů: specialista 2-3 kusy, ostatní 1
  const outCount=isSpec?Math.min(3,1+Math.floor(Math.random()*2.5+0.5)):1;
  if(!G[itemKey])G[itemKey]=[];
  for(let i=0;i<outCount;i++)G[itemKey].push(outQ);
  G.log.push(`__PROD__${it.icon} ${outCount}× ${L==="cs"?it.cs:it.en} ${stars(outQ)}${isSpec?" (specialista ×"+outCount+")":""}`);
  render();
}

function craftEngrave(inputKey){
  const p=G, L=p.lang;
  const rytec=p.workers.find(w=>w.prof==="rytec");
  if(!rytec){
    G.log.push(`__EVT__⛔ ${L==="cs"?"Rytec není v huti":"No engraver in foundry"}`);
    render(); return;
  }
  if(p.round<PREP){
    G.log.push(`__EVT__⛔ ${L==="cs"?"Rytí jen v kampani":"Engraving only during campaign"}`);
    render(); return;
  }
  const inv=[...(p[inputKey]||[])];
  if(!inv.length){
    G.log.push(`__EVT__⛔ ${L==="cs"?"Žádný kus k rytí":"No piece to engrave"}`);
    render(); return;
  }
  inv.sort((a,b)=>b-a);
  const q=inv[0];
  G[inputKey]=inv.slice(1);
  const outKey="rytina_"+inputKey;
  if(!G[outKey])G[outKey]=[];
  G[outKey].push(q);
  const srcName=GROUND_ITEMS[inputKey]?.cs||BLOWN_ITEMS[inputKey]?.cs||inputKey;
  G.log.push(`__PROD__✂️ ${L==="cs"?"Rytina na":"Engraved"} ${srcName} ${stars(q)} (+40% cena)`);
  render();
}

// Výpočet účinnosti pece — srdce v4
function calcFurnaceEff(furnace, panevQuality){
  const ft=FURNACE_TYPES[furnace.type];
  const runInNorm=furnace.runIn/ft.maxRunIn; // 0..1
  const shamotBonus=furnace.shamotWear<30?EFF_SHAMOT:(furnace.shamotWear<60?EFF_SHAMOT*.5:0);
  const eff=EFF_BASE+(runInNorm*EFF_RUNIN)+((panevQuality/5)*EFF_PANEV)+shamotBonus;
  return Math.min(eff, 0.92); // hard cap
}

// Toast systém
let _toastTimer=null;
function showToast(title, lines){
  let tc=document.getElementById("toastContainer");
  if(!tc){tc=document.createElement("div");tc.id="toastContainer";tc.className="toast-container";document.body.appendChild(tc);}
  tc.innerHTML="";
  const t=document.createElement("div");t.className="toast";
  if(title){const tl=document.createElement("div");tl.className="toast-title";tl.textContent=title;t.appendChild(tl);}
  lines.filter(Boolean).slice(0,8).forEach(l=>{const d=document.createElement("div");d.textContent=l;t.appendChild(d);});
  tc.appendChild(t);
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>{if(tc)tc.innerHTML="";},7000);
}

// Sestavit literární zápis do kroniky
function buildChronicleEntry(round, isP, L, productionLines, economyLines, eventLines){
  const ms=L==="cs"?MONTHS_CS:MONTHS_EN;
  const lines=[];
  const prepTexts=L==="cs"?CHRON_PREP_CS:CHRON_PREP_EN;
  const campTexts=L==="cs"?CHRON_CAMP_CS:CHRON_CAMP_EN;
  const flavor=isP?prepTexts[round%prepTexts.length]:campTexts[(round-4)%campTexts.length];
  lines.push(`__FLAVOR__${flavor}`);

  // Humorné příhody — šance závisí na pivu
  const beerLvl=G?.beer||0;
  const beerChance=[0.05,0.15,0.30,0.50][Math.min(beerLvl,3)];
  const roll=Math.random();
  if(roll<beerChance){
    const r2=Math.random();
    if(r2<0.4){
      const h=CHRON_HUMOR_CS[Math.floor(Math.random()*CHRON_HUMOR_CS.length)];
      lines.push(`__FLAVOR__😄 ${h}`);
    }else if(r2<0.7){
      const ev=CHRON_HUMOR_BAD[Math.floor(Math.random()*CHRON_HUMOR_BAD.length)];
      lines.push(`__FLAVOR__🍺😬 ${ev.cs}`);
      if(G){
        if(ev.effect==="morale")G.morale=Math.max(0,G.morale+ev.val);
        else if(ev.effect==="panev")G.pReady=Math.max(0,G.pReady+ev.val);
        else if(ev.effect==="potash")G.res.potash=Math.max(0,G.res.potash+ev.val);
        else if(ev.effect==="charcoal")G.res.charcoal=Math.max(0,G.res.charcoal+ev.val);
        else if(ev.effect==="sand")G.res.sand=Math.max(0,G.res.sand+ev.val);
        else if(ev.effect==="varka")G.waldglas=G.waldglas.slice(0,Math.max(0,G.waldglas.length+ev.val));
      }
    }else{
      const ev=CHRON_HUMOR_GOOD[Math.floor(Math.random()*CHRON_HUMOR_GOOD.length)];
      lines.push(`__FLAVOR__🍺😄 ${ev.cs}`);
      if(G){
        if(ev.effect==="morale")G.morale=Math.min(100,G.morale+ev.val);
        else if(ev.effect==="wood")G.res.wood+=ev.val;
        else if(ev.effect==="clay")G.res.clay+=ev.val;
        else if(ev.effect==="grose")G.grose+=ev.val;
      }
    }
  }
  lines.push(`__MONTH__${ms[round]}`);
  lines.push(`__FLAVOR__${flavor}`);
  productionLines.forEach(l=>lines.push(`__PROD__${l}`));
  economyLines.forEach(l=>lines.push(`__ECO__${l}`));
  eventLines.forEach(l=>lines.push(`__EVT__${l}`));
  return lines;
}

// ── HERNÍ LOGIKA ────────────────────────────────────────────
function processRound(){
  const p=G, r=p.res, round=p.round, isP=round<PREP, isC=round>=PREP;
  const L=p.lang, ms=L==="cs"?MONTHS_CS:MONTHS_EN;
  let mor=p.morale, forest=p.forest, grose=p.grose, debt=p.debt;
  let pR=p.pReady, pA=[...p.pAging], pU=p.pUses, pQ=p.panevQuality;
  let fT=p.fTemp, fA=p.fActive;
  let furnace={...p.furnace};
  const wg=[...p.waldglas], cr=[...p.crystal];
  let tW=p.tW, tC=p.tC, tQS=p.tQS, tQN=p.tQN, done=p.done, mB=false;
  const con=[...p.contracts];
  const log=[...p.log];

  log.push(`\n── ${ms[round]} · ${isP?(L==="cs"?"Příprava":"Prep"):(L==="cs"?"Kampaň":"Campaign")} ──`);

  // Výpočet aktuální účinnosti pece
  const fEff=calcFurnaceEff(furnace, pQ);
  const ft=FURNACE_TYPES[furnace.type];

  // 1. Dělníci
  let reforestCount=0; // kolik dělníků sází stromy
  for(const w of p.workers){
    const eff=1+w.lv*.3-w.fat*.2;
    if(w.task==="logging"){
      if(forest<=0){
        log.push(`🌲 ${w.name}: ${L==="cs"?"les vyčerpán — přesuňte na výsadbu":"forest depleted — reassign to reforest"}!`);
        continue;
      }
      const silakMult=w.traits?.includes("silak")?1.5:1;
      const winterMult=WINTER_LOG_MULT[round]||1;
      const cut=Math.min(clamp(Math.round(2*eff*silakMult*winterMult),1,6),forest);
      forest-=cut; r.wood+=cut*3;
      const winterNote=winterMult>1?` ❄️+${Math.round((winterMult-1)*100)}%`:"";
      log.push(`🌲 ${w.name}: -${cut} ${L==="cs"?"parcel":"parcels"} → +${cut*3} 🌳${winterNote} (${forest}/${p.forestMax||INIT_FOREST})`);
    }else if(w.task==="reforest"&&isP){
      reforestCount++;
      log.push(`🌱 ${w.name}: ${L==="cs"?"sází stromy (+4 parcely v mezisezóně)":"planting trees (+4 parcels next interseason)"}`);
    }else if(w.task==="quarry"){
      const sa=clamp(Math.round(2*eff),1,4), li=clamp(Math.round(eff),1,2);
      r.sand+=sa; r.limestone+=li;
      log.push(`⛏️ ${w.name}: +${sa} 🏖️, +${li} 🪨`);
    }else if(w.task==="potash"){
      // Potaš: přímo spotřebuje dřevo z alokace, ne přes koeficient
      const woodForPotash=Math.floor(r.wood*(p.wa.potash/100));
      if(woodForPotash>=WOOD_PER_POTASH){
        const m=Math.floor(woodForPotash/WOOD_PER_POTASH);
        r.wood-=m*WOOD_PER_POTASH; r.potash+=m;
        log.push(`🌿 ${w.name}: -${m*WOOD_PER_POTASH} 🪵 → +${m} potaš`);
      }else log.push(`🌿 ${w.name}: ${L==="cs"?"málo dřeva pro potaš":"not enough wood for potash"}`);
    }else if(w.task==="panev"&&isP){
      if(r.clay>=2&&r.food>=1){
        r.clay-=2; r.food-=1;
        if(r.shamot>0)r.shamot--;
        const panvarLv=w.prof==="panvar"?w.lv:1;
        const kovakBonus=w.traits?.includes("kovak")?1:0;
        const winterBonus=WINTER_PANEV_BONUS[round]||0;
        const pNewQ=clamp(panvarLv+kovakBonus+winterBonus+Math.floor(Math.random()*2),1,5);
        pA.push({cr:round,rdy:round+PANEV_AGE,q:pNewQ});
        const winterNote=winterBonus>0?` ❄️ (mráz čistí jíl +1)`:"";
        log.push(`🏺 ${w.name}: ${L==="cs"?"pánev kvality":"crucible quality"} ${stars(pNewQ)}${winterNote}`);
      }else log.push(`🏺 ${w.name}: ${L==="cs"?"chybí jíl nebo jídlo":"need clay or food"}`);
    }else if(w.task==="formar"){
      // Formař vyrábí dřevěné formy — zrají 1 kolo, aktivní od března (kolo 4)
      if(round<4){
        log.push(`🌳 ${w.name}: ${L==="cs"?"čeká na jaro — začíná v březnu":"waiting for spring — starts in March"}`);
      }else{
        const FORMA_WOOD=2, FORMA_WATER=1, FORMA_FOOD=1;
        if(r.wood>=FORMA_WOOD&&r.water>=FORMA_WATER&&r.food>=FORMA_FOOD){
          r.wood-=FORMA_WOOD; r.water-=FORMA_WATER; r.food-=FORMA_FOOD;
          const formarLv=w.prof==="formar"?w.lv:1;
          const kovakBonus=w.traits?.includes("kovak")?1:0;
          const formQ=clamp(formarLv+kovakBonus+Math.floor(Math.random()*2),1,5);
          p.formyAging=[...(p.formyAging||[]),{cr:round,rdy:round+FORMA_AGE,q:formQ}];
          log.push(`🌳 ${w.name}: ${L==="cs"?"forma dána sušit, hotová za":"mould drying, ready in"} ${FORMA_AGE} ${L==="cs"?"kolo":"round"} (${stars(formQ)})`);
        }else{
          const missing=[];
          if(r.wood<2)missing.push("2🪵");
          if(r.water<1)missing.push("1💧");
          if(r.food<1)missing.push("1🍞");
          log.push(`🌳 ${w.name}: ${L==="cs"?"chybí":"missing"} ${missing.join(", ")}`);
        }
      }
    }else if(w.task==="water"){
      const wa=clamp(Math.round(3*eff),2,5);r.water+=wa;
      log.push(`💧 ${w.name}: +${wa}`);
    }else if(w.task==="clay"){
      const cl=clamp(Math.round(2*eff),1,3);r.clay+=cl;
      log.push(`🧱 ${w.name}: +${cl}`);
    }else log.push(`😴 ${w.name}: ${L==="cs"?"odpočívá":"resting"}`);
  }

  // 2b. Dozrávání forem
  const formyAging=[...(p.formyAging||[])];
  const rdyFormy=formyAging.filter(x=>round>=x.rdy);
  if(rdyFormy.length){
    r.formy=(r.formy||0)+rdyFormy.length;
    log.push(`🌳 ${rdyFormy.length}× ${L==="cs"?"forma hotová":"mould ready"}!`);
  }
  const formyAgingNew=formyAging.filter(x=>round<x.rdy);
  const rdyPanve=pA.filter(x=>round>=x.rdy);
  if(rdyPanve.length){
    pR+=rdyPanve.length;
    // Nová pánev: bereme průměrnou kvalitu dozrálých
    const avgQ=Math.round(rdyPanve.reduce((s,x)=>s+x.q,0)/rdyPanve.length);
    pQ=avgQ;
    log.push(`🏺 ${rdyPanve.length}× ${L==="cs"?"pánev dozrálo":"crucible ready"} (${stars(avgQ)})!`);
  }
  pA=pA.filter(x=>round<x.rdy);

  // 3. Kampaň — pec
  if(isC){
    // Šamot degraduje v kampani (zima je náročnější)
    const shamotDeg=round>=6?3:1;
    furnace.shamotWear=Math.min(100,furnace.shamotWear+shamotDeg);

    // Palivo: přímá spotřeba z fuel alokace (bez extra koeficientu)
    const fuelAlloc=Math.floor(r.wood*(p.wa.fuel/100));
    const fuelNeed=Math.ceil(FUEL_BASE*ft.fuelMult)+(round>=6?2:0);
    const fuelUsed=Math.min(fuelAlloc,fuelNeed+3);

    if(fuelUsed>=fuelNeed){
      r.wood-=fuelUsed;
      // Teplota závisí na peci a palivu
      const tgt=clamp(ft.maxTemp*(0.6+(fuelUsed-fuelNeed)*0.04)+Math.random()*8,40,ft.maxTemp);
      fT=Math.round(fT*.25+tgt*.75); fA=true;
      // Zaběhávání pece — každá kampaňová várka trochu pomáhá
      furnace.runIn=Math.min(ft.maxRunIn, furnace.runIn+2);
      log.push(`🔥 ${L==="cs"?"Palivo":"Fuel"}: ${fuelUsed}🪵 → ${zone(fT).l} ${fT}% · eff ${Math.round(fEff*100)}%`);
    }else{
      r.wood=Math.max(0,r.wood-fuelUsed);
      fT=Math.max(0,fT-25);
      if(fT<30)fA=false;
      log.push(`⚠️ ${L==="cs"?"Málo paliva! Teplota klesá":"Low fuel! Temp drops"}: ${fT}%`);
    }

    // Varování: šamot
    if(furnace.shamotWear>=80&&!log.some(l=>l.includes("šamot"))){
      log.push(`⚠️ ${L==="cs"?"Šamot kriticky opotřeben! Opravit v mezisezóně.":"Shamot critically worn! Repair between seasons."}`);
    }

    // Kolo 1 — Waldglas
    if(fA&&fT>=40&&pR>0&&r.sand>=3&&r.potash>=2&&r.limestone>=1&&r.water>=1){
      r.sand-=3;r.potash-=2;r.limestone-=1;r.water-=1;pU--;
      const q=qRoll(tAcc(fT),fEff*3,mor,pQ);
      wg.push(q);tW++;tQS+=q;tQN++;
      log.push(`🔥 → 1× ${L==="cs"?"lesní sklo":"waldglas"} ${stars(q)} (eff:${Math.round(fEff*100)}%)`);
      if(pU<=0){
        pR--;r.shamot++;pU=pR>0?PANEV_DUR:0;
        mor-=4;
        log.push(`💔 ${L==="cs"?"Pánev praskla":"Crucible cracked"} → +1 šamot (${pR} ${L==="cs"?"zbývá":"left"})`);
        if(pR>0)pQ=Math.max(1,pQ-1); // prasklá → další pánev nižší kvality
      }
    }else if(fA&&fT>=40&&pR<=0){
      log.push(`🏺 ${L==="cs"?"Žádné pánve! Tavení stojí.":"No crucibles! Smelting halted."}`);
    }

    // Kolo 3 — Křišťál
    if(fA&&fT>=65&&pR>0&&r.pureSand>=3&&r.refinedPotash>=2&&r.limestone>=1&&r.charcoal>=1){
      r.pureSand-=3;r.refinedPotash-=2;r.limestone-=1;r.charcoal-=1;
      const znalecBonus=p.workers.some(w=>w.traits?.includes("znalec")&&w.task!=="idle")?1:0;
      const q=clamp(qRoll(tAcc(fT),fEff*3,mor,pQ+1)+znalecBonus,1,5);
      cr.push(q);tC++;tQS+=q;tQN++;
      log.push(`✨ → 1× ${L==="cs"?"křišťál":"crystal"} ${stars(q)}`);
    }
  }else{
    // Příprava: pec chladne
    if(round===PREP-1){
      // Duben — temperování: spotřeba 50% paliva
      const fuelNeedTemp=Math.ceil(FUEL_BASE*ft.fuelMult/2);
      const fuelAllocTemp=Math.floor(r.wood*(p.wa.fuel/100));
      const fuelUsedTemp=Math.min(fuelAllocTemp,fuelNeedTemp);
      r.wood=Math.max(0,r.wood-fuelUsedTemp);
      fT=Math.max(fT, 35);
      fA=false;
      log.push(`🌡️ ${L==="cs"?"Temperování pece":"Furnace tempering"} · -${fuelUsedTemp}🪵 → 35%`);
    }else if(round<=1){
      // Listopad (0) a Prosinec (1) — rychlé chladnutí, max 15%
      fT=Math.min(15, Math.max(0, fT-20));
      if(fT<10)fA=false;
    }else{
      // Leden (2) a dál — studená
      fT=0; fA=false;
    }
  }

  // 4. Pivo
  const beer=BEER[p.beer]; mor+=beer.m;
  const bCost=beer.cost*Math.ceil(p.workers.length/3); grose-=bCost;

  // 4b. Jídlo — dělníci jedí každé kolo
  const foodNeed=Math.ceil(p.workers.length*0.5); // ~půl jednotky na dělníka
  if(r.food>=foodNeed){
    r.food-=foodNeed;
    if(r.food<=2)log.push(`__EVT__🍞 ${L==="cs"?"Zásoby jídla docházejí!":"Food supplies running low!"}`);
  }else if(r.food>0){
    // Částečné zásobení — menší postih
    r.food=0;
    mor-=5;
    log.push(`__EVT__🍞 ${L==="cs"?"Málo jídla — dělníci hladoví. Nálada -5.":"Not enough food — workers hungry. Morale -5."}`);
  }else{
    // Žádné jídlo — vážný postih
    mor-=10;
    const wkDamaged=p.workers.map(w=>({...w,health:Math.max(20,(w.health||100)-5)}));
    G.workers=wkDamaged;
    log.push(`__EVT__💀 ${L==="cs"?"Hladomor! Žádné jídlo. Nálada -10, zdraví dělníků klesá.":"Famine! No food. Morale -10, worker health declining."}`);
  }

  // Zabijačka — Říjen (kolo 11) nebo Září (kolo 10): automatický bonus jídla
  if(round===10||round===11){
    const zabiBonus=3+Math.floor(Math.random()*3); // 3-5 jednotek
    r.food+=zabiBonus;
    log.push(`__EVT__🐷 ${L==="cs"
      ?`Zabijačka! Podzimní porážka dobytka. +${zabiBonus} jídla na zimu.`
      :`Autumn slaughter! +${zabiBonus} food for winter.`}`);
    // Bonus morálky — sváteční nálada
    mor+=5;
    if(round===10)log.push(`__FLAVOR__${L==="cs"
      ?"Kouř z udírny táhne přes dvůr. Na chvíli je v huti jako o posvícení."
      :"Smoke from the smokehouse drifts across the yard. For a moment it feels like a village feast."}`);
  }

  // Políčko — task "field" přidá jídlo v přípravě i kampani
  for(const w of p.workers){
    if(w.task==="field"){
      // Léto nejlepší, zima nic
      const fieldYield=[0,0,0,0,1,1,2,2,2,2,1,0]; // dle měsíce
      const yld=fieldYield[round]||0;
      if(yld>0){r.food+=yld;log.push(`🌾 ${w.name}: +${yld} 🍞 ${L==="cs"?"z políčka":"from field"}`);}
      else log.push(`🌾 ${w.name}: ${L==="cs"?"zima — políčko neplodí":"winter — field yields nothing"}`);
    }
  }
  // 5. Mzdy
  const wages=p.workers.length*2; grose-=wages;
  // 6. Splácení dluhu
  let dPay=0;
  if(debt>0&&grose>5){dPay=Math.min(6,grose-2,debt);grose-=dPay;debt-=dPay;}
  // 7. Zakázky
  for(let i=con.length-1;i>=0;i--){
    const c=con[i],inv=c.item==="crystal"?cr:wg;
    if(inv.length>=c.qty&&round<=c.due){
      for(let j=0;j<c.qty;j++)inv.pop();
      grose+=c.reward;done++;
      log.push(`📜 ${L==="cs"?"Zakázka splněna":"Contract done"}! +${c.reward}g`);
      con.splice(i,1);
    }else if(round>c.due){
      log.push(`📜 ${L==="cs"?"Zakázka vypršela":"Contract expired"}`);
      con.splice(i,1);
    }
  }

  // 8. Náhodné události
  const evts=[];
  if(isC&&beer.acc>0&&Math.random()<beer.acc){evts.push("crack");if(pR>0){pR--;mor-=8;}}
  if(isC&&mor>65&&Math.random()<.15)evts.push("good");
  if(round<=3&&Math.random()<.25){evts.push("winter");mor-=5;r.wood=Math.max(0,r.wood-4);}
  if(isC&&furnace.shamotWear>=90&&Math.random()<.4){evts.push("shamotCrack");mor-=10;fT=Math.max(0,fT-20);}
  if(forest<=0&&!evts.includes("forestDepleted"))evts.push("forestDepleted");
  // Kupec přijíždí na Vánoce, Tři králové, Velikonoce
  if(KUPEC_ROUNDS.includes(round)&&Math.random()<.8){evts.push("merchant");mB=true;}

  // Přirozená progression barev — kramář/event bez Baranovského
  const hasBaran=p.workers.some(w=>w.npcId==="npc_baran");
  const unl=p.unlockedRecipes||[];

  // Sv. Jiří (kolo 5 = Duben) — modal event + foukači na trhu
  if(round===5&&!unl.includes("_svjiri_foukaci")){
    unl.push("_svjiri_foukaci");
    evts.push("svjiri");
    // Vygeneruj 1–2 NPC na trhu (vždy 1 foukač pokud 2)
    const foukProfs=["foukat_lesni","foukat_kristal","foukat_dekor","foukat_formy"];
    const brusProfs=["brusic_hrana","brusic_kulic","rytec"];
    const availNPC=getAvailableNPC().filter(n=>n.availSeason<=p.season+1);
    const foukCands=availNPC.filter(n=>foukProfs.includes(n.prof));
    const otherCands=availNPC.filter(n=>brusProfs.includes(n.prof)||n.prof==="formar");
    const picked=[];
    if(foukCands.length){picked.push(foukCands[Math.floor(Math.random()*foukCands.length)]);}
    if(otherCands.length&&Math.random()>.4){picked.push(otherCands[Math.floor(Math.random()*otherCands.length)]);}
    else if(foukCands.length>1&&Math.random()>.5){
      const rest=foukCands.filter(n=>!picked.find(x=>x.id===n.id));
      if(rest.length)picked.push(rest[Math.floor(Math.random()*rest.length)]);
    }
    p.trhuNPC=picked.map(npc=>({
      id:"t"+npc.id, npcId:npc.id, name:npc.name, prof:npc.prof, lv:npc.lv,
      traits:npc.traits, hireCost:npc.hireCost, wageMod:npc.wageMod,
      portrait:npc.portrait, quote_cs:npc.quote_cs, quote_en:npc.quote_en,
      loyalty:npc.loyalty, health:npc.health, mood:npc.mood,
      gender:npc.gender||"m", xp:0, fat:0, task:WERKSTAT_PROFS.includes(npc.prof)?"werkstat":"idle"
    }));
  }
  // Kampaňové kolo 3 (Červen=kolo 7) → burel a crocusMartis zdarma
  if(isC&&round===7&&!unl.includes("_burel_free")){
    p.additives.burel=(p.additives.burel||0)+2;
    p.additives.crocusMartis=(p.additives.crocusMartis||0)+2;
    unl.push("_burel_free");
    log.push(`__EVT__🧑‍🌾 ${L==="cs"
      ?"Putující barvíř z Liberce přinesl burel a crocus martis. Říká: zkuste to s křišťálem."
      :"A travelling dyer from Liberec brought burel and crocus martis. Try it with crystal, he says."}`);
  }
  // Kampaňové kolo 5 (Srpen=kolo 9) → šmolka → odemkne modrou
  if(isC&&round===9&&!unl.includes("modra")){
    p.additives.smolka=(p.additives.smolka||0)+1;
    unl.push("modra");
    log.push(`__EVT__🔵 ${L==="cs"
      ?"Saský kramář zastavil u hutě. Prodal hrst šmolky za 3 groše. Recept na modrou je váš!"
      :"A Saxon peddler stopped at the foundry. Sold a handful of zaffre for 3 groats. Blue recipe unlocked!"}`);
    grose=Math.max(0,grose-3);
  }
  // Příští sezóna (season>=2, kolo 6=Květen) → aesUstum → smaragd
  if(p.season>=2&&round===6&&!unl.includes("smaragd")){
    p.additives.aesUstum=(p.additives.aesUstum||0)+1;
    unl.push("smaragd");
    log.push(`__EVT__🟢 ${L==="cs"
      ?"Pánvař Káninský zkusil pálit měď v pomocné peci. Výsledek: smaragdová zeleň! Recept zapsán."
      :"Káninský tried burning copper in the auxiliary furnace. Result: emerald green! Recipe recorded."}`);
  }
  // Sezóna 3, kolo 5 → lattimo suroviny
  if(p.season>=3&&round===5&&!unl.includes("lattimo")){
    p.additives.cin=(p.additives.cin||0)+1;
    p.additives.olovo=(p.additives.olovo||0)+1;
    unl.push("lattimo");
    log.push(`__EVT__⚪ ${L==="cs"
      ?"Benátský obchodník zanechal recept na lattimo. Cín a olovo jsou v sáčku."
      :"A Venetian trader left a lattimo recipe. Tin and lead in the bag."}`);
  }
  // Rubín — POUZE přes Baranovského (endgame, nikdy přirozeně)

  // Baranovský — bonus: vždy o krok napřed + vzácnější věci
  if(hasBaran&&isC){
    const baranLv=p.workers.find(w=>w.npcId==="npc_baran")?.lv||1;
    // Červen (kolo 7) — B. přiveze šmolku dřív
    if(round===7&&!unl.includes("modra")){
      p.additives.smolka=(p.additives.smolka||0)+2;
      unl.push("modra");
      log.push(`__EVT__🔵 🗣️ ${L==="cs"
        ?"Baranovský: Šmolku ze Saska mám. Modrá bude. Recept na modrou odemčen!"
        :"Baranovský: Got zaffre from Saxony. Blue it is. Blue recipe unlocked!"}`);
    }
    // Srpen (kolo 9) — B. přiveze aesUstum
    if(round===9&&!unl.includes("smaragd")){
      p.additives.aesUstum=(p.additives.aesUstum||0)+2;
      unl.push("smaragd");
      log.push(`__EVT__🟢 🗣️ ${L==="cs"
        ?"Baranovský přivezl pálenou měď z Chomutova. Smaragd odemčen!"
        :"Baranovský brought burnt copper from Chomutov. Emerald unlocked!"}`);
    }
    // S2 start → lattimo rovnou
    if(p.season===2&&round===0&&!unl.includes("lattimo")){
      p.additives.cin=(p.additives.cin||0)+2;
      p.additives.olovo=(p.additives.olovo||0)+2;
      unl.push("lattimo");
      log.push(`__EVT__⚪ 🗣️ ${L==="cs"
        ?"Baranovský: Cín a olovo. Uděláte bílé jako porcelán. Lattimo odemčeno!"
        :"Baranovský: Tin and lead. White like porcelain. Lattimo unlocked!"}`);
    }
    // S3 + vyšší level → antimon (příprava na rubín)
    if(p.season>=3&&baranLv>=3&&round===0&&!unl.includes("_antimon_hint")){
      p.additives.antimon=(p.additives.antimon||0)+1;
      unl.push("_antimon_hint");
      log.push(`__EVT__🔘 🗣️ ${L==="cs"
        ?"Baranovský šeptem: Seženu zlatý prach. Kunckelův rubín není legenda. Antimon na skladě."
        :"Baranovský whispers: I will find gold dust. Kunckel's ruby is no legend. Antimony in stock."}`);
    }
  }
  p.unlockedRecipes=unl;

  mor=clamp(mor,0,100); grose=Math.max(0,grose);
  // Aktualizuj dělníky: únava, XP, level-up
  const hasUcitel=p.workers.some(w=>w.traits?.includes("ucitel")&&w.task!=="idle");
  const wk=p.workers.map(w=>{
    const isWerkstat=w.task==="werkstat";
    const isIdle=w.task==="idle";
    // Foukač/brusič na Verštatu se unaví na ≥75% → automaticky přepnout na Odpočinek
    const autoIdle=isWerkstat&&(w.fat||0)>=0.75;
    const effectiveIdle=isIdle||isWerkstat; // werkstat = nulová únava
    const newFat=effectiveIdle?Math.max(0,w.fat-0.5):Math.min(1,w.fat+(w.traits?.includes("vytrvalec")?0.07:0.1));
    const newTask=autoIdle?"idle":w.task;
    // Zdraví — klesá při dlouhé únavě, roste při odpočinku a jídle
    const hasFood=r.food>0;
    let newHealth=w.health||100;
    if(newFat>0.8&&!effectiveIdle) newHealth=Math.max(0,newHealth-3); // přepracování
    if(effectiveIdle) newHealth=Math.min(100,newHealth+5); // odpočinek regeneruje
    if(hasFood&&newHealth<100) newHealth=Math.min(100,newHealth+1); // jídlo pomáhá
    // Loajalita — sdílí směr s morálkou hutě
    let newLoyalty=w.loyalty||75;
    const moraleDir=mor>60?1:mor>40?0:-1;
    newLoyalty=Math.max(0,Math.min(100,newLoyalty+moraleDir));
    if(effectiveIdle) newLoyalty=Math.min(100,newLoyalty+1); // odpočinek zlepšuje loajalitu
    // Odchod při nízké loajalitě (ne Houževnatý)
    const willLeave=newLoyalty<25&&!w.traits?.includes("houzevatny")&&Math.random()<0.15;
    // XP: za každé aktivní kolo +1 (učitel bonus); werkstat počítá jako aktivní
    const xpGain=isIdle?0:(hasUcitel&&!w.traits?.includes("ucitel")?1.5:1);
    const newXp=(w.xp||0)+xpGain;
    // Level-up?
    let newLv=w.lv;
    const xpNeeded=XP_PER_LEVEL[w.lv-1]||999;
    if(newLv<5&&newXp>=xpNeeded){
      newLv=Math.min(5,w.lv+1);
      log.push(`__EVT__⭐ ${w.name} ${L==="cs"?"postoupil na úroveň":"leveled up to"} ${newLv}!`);
    }
    if(willLeave){
      log.push(`__EVT__👋 ${w.name} ${L==="cs"?"odešel — nálada v huti byla příliš nízká.":"left — morale was too low."}`);
      return null; // odstraní z pole
    }
    // Zdraví ovlivňuje výkon
    const healthPenalty=newHealth<50?0.15:newHealth<30?0.3:0;
    return{...w,task:newTask,fat:newFat,xp:newLv>w.lv?0:newXp,lv:newLv,health:Math.round(newHealth),loyalty:Math.round(newLoyalty)};
  }).filter(Boolean);

  const nr=round+1;
  const isLastRound=nr>=ROUNDS;

  // Sestavit toast a kronikový zápis
  const prodLines=[], ecoLines=[], evtLines=[];
  if(isC&&wg.length>p.waldglas.length)prodLines.push(`🔥 ${wg.length-p.waldglas.length}× waldglas uvařeno`);
  if(isC&&cr.length>p.crystal.length)prodLines.push(`✨ ${cr.length-p.crystal.length}× křišťál uvařen`);
  if(isC&&fA)prodLines.push(`Pec: ${zone(fT).l} ${fT}% · eff ${Math.round(calcFurnaceEff(furnace,pQ)*100)}%`);
  ecoLines.push(`💰 ${grose}g`+(debt>0?` · dluh ${debt}g`:""));
  ecoLines.push(`💸 mzdy ${wages}g · pivo ${bCost}g`+(dPay?` · dluh -${dPay}g`:""));
  const logAdditions=buildChronicleEntry(round,isP,L,prodLines,ecoLines,evtLines);

  Object.assign(G,{
    round:nr, res:r, log:[...log,...logAdditions], morale:mor, forest, grose, debt,
    pReady:pR, pAging:pA, pUses:pU>0?pU:(pR>0?PANEV_DUR:0), panevQuality:pQ,
    furnace, fTemp:fT, fActive:fA,
    waldglas:wg, crystal:cr, mBonus:mB,
    tW, tC, tQS, tQN, done, contracts:con, workers:wk, shop:genShop(),
    reforestWorkers:(G.reforestWorkers||0)+reforestCount,
    unlockedRecipes:unl,
    formyAging:formyAgingNew,
    summary:{wages,bCost,dPay,mDelta:mor-p.morale,fCut:p.forest-forest,fEff:Math.round(calcFurnaceEff(furnace,pQ)*100)},
    events:evts.slice(1), curEvt:evts[0]||null,
    phase:evts[0]?"event":(isLastRound?"interseasonPhase":"summary")
  });

  // Toast — kompaktní delta přehled kola
  const toastTitle=`${(L==="cs"?MONTHS_CS:MONTHS_EN)[round]} · ${isP?(L==="cs"?"Příprava":"Prep"):(L==="cs"?"Kampaň":"Campaign")}`;
  const tL=[];

  // Produkce (kampaň)
  const newWg=wg.length-p.waldglas.length, newCr=cr.length-p.crystal.length;
  if(newWg>0)tL.push(`🔥 +${newWg}× waldglas`);
  if(newCr>0)tL.push(`✨ +${newCr}× křišťál`);
  // Pec stav (kampaň)
  if(isC&&fA)tL.push(`🌡️ ${fT}% · eff ${Math.round(calcFurnaceEff(furnace,pQ)*100)}%`);

  // Les
  const fCut=p.forest-forest;
  if(fCut>0)tL.push(`🌲 ${forest}/${p.forestMax||INIT_FOREST} (-${fCut})`);

  // Pánve — dozrálé nebo prasklé
  const crackedLog=log.filter(l=>l.includes("💔")).length;
  if(crackedLog>0)tL.push(`💔 pánev praskla ×${crackedLog}`);
  const rdyPanveCount=log.filter(l=>l.includes("pánev dozrálo")||l.includes("crucible ready")).length;
  if(rdyPanveCount>0)tL.push(`🏺 +${rdyPanveCount}× pánev hotová`);

  // Ekonomika — delta
  const groseDelta=grose-p.grose;
  tL.push(`💰 ${grose}g (${groseDelta>=0?"+":""}${groseDelta}g)`);
  if(wages>0||bCost>0)tL.push(`💸 -${wages+bCost}g (mzdy+pivo${dPay?"+dluh":""})`);

  // Morálka — jen pokud se výrazně změnila
  const morDelta=mor-p.morale;
  if(Math.abs(morDelta)>=5)tL.push(`😊 ${mor} (${morDelta>=0?"+":""}${morDelta})`);

  // Eventy
  const evtLog=log.filter(l=>l.includes("❄️")||l.includes("⭐")||l.includes("👋")||l.includes("🧱"));
  evtLog.slice(0,2).forEach(l=>tL.push(l.replace(/__EVT__/g,"").replace(/__EVT__/g,"").trim().slice(0,50)));

  showToast(toastTitle, tL);
  autoSave();
  render();
}

function autoSave(){
  try{
    localStorage.setItem("sh_v9",JSON.stringify({...G,_savedAt:Date.now()}));
  }catch(e){console.warn("AutoSave failed:",e);}
}

// ── MEZISEZÓNNÍ FÁZE ────────────────────────────────────────
function startInterseason(){
  const p=G;
  // Regenerace lesa: základní + bonus za výsadbu
  const reforestBonus=Math.min(p.reforestWorkers||0, 4)*2; // max +8 za sezónu výsadby
  const naturalRegen=p.forest>0?FOREST_REGEN_BASE:1; // vyčerpaný les roste pomaleji
  const totalRegen=naturalRegen+reforestBonus;
  const forestCap=p.forestMax||INIT_FOREST;
  const newForest=Math.min(forestCap, p.forest+totalRegen);
  // Pec chladne, drží 65% zaběhnutosti
  const newRunIn=Math.round(p.furnace.runIn*0.65);
  const furnace={...p.furnace, runIn:newRunIn, age:p.furnace.age+1};

  G.forest=newForest;
  G.furnace=furnace;
  G.reforestWorkers=0;

  // Baranovský — přiveze nabídku dle sezóny (i bez něj v huti — pošle vzkaz)
  const baran=G.workers.find(w=>w.npcId==="npc_baran");
  const baranNPC=NPC_ROSTER.find(n=>n.id==="npc_baran");
  let baranOffer=null;
  const pool=BARAN_OFFERS.filter(o=>o.season<=p.season);
  if(pool.length){
    const pick=pool[Math.floor(Math.random()*pool.length)];
    baranOffer={...pick};
    if(baran){
      G.log.push(`__EVT__🗣️ ${baran.name}: "${G.lang==="cs"?pick.cs:pick.en}" (${pick.qty}× ${ADDITIVES[pick.item]?.icon||"?"} za ${pick.price}g)`);
    }else{
      G.log.push(`__EVT__✉️ ${G.lang==="cs"?"Dopis od Baranovského":"Letter from Baranovský"}: "${G.lang==="cs"?pick.cs:pick.en}" (${pick.qty}× ${ADDITIVES[pick.item]?.icon||"?"} za ${pick.price}g)`);
    }
  }
  G.baranOffer=baranOffer;

  // Vygeneruj unikátní kandidáty pro nábor
  // Sezóna 1: foukači se hlásí — nabídnout všechny dostupné (až 4)
  // Sezóna 2+: brusiči + rytec se přidají
  const candCount=p.season===1?4:3+Math.floor(Math.random()*2);
  const candidates=genCandidates(p.season+1, candCount);

  // Narrativní zpráva o Sv. Jiří — foukači se hlásí po první sezóně
  const foukNarr=p.season===1&&candidates.some(c=>["foukat_lesni","foukat_kristal","foukat_dekor","foukat_formy"].includes(c.prof));
  const brusNarr=p.season>=2&&candidates.some(c=>["brusic_hrana","brusic_kulic","rytec"].includes(c.prof));
  if(foukNarr){
    G.log.push(`__EVT__💨 ${G.lang==="cs"
      ?"Kampaň na Sv. Jiří úspěšně rozžehnuta. Zpráva se šíří krajem — u hutě se zastavují zájemci o místo foukače."
      :"Campaign lit on St. George's Day. Word spreads — glassblowers are asking about positions at the foundry."}`);
  }
  if(brusNarr){
    G.log.push(`__EVT__💎 ${G.lang==="cs"
      ?"Dobrá pověst hutě přitáhla brusičské mistry. Hlásí se o práci."
      :"The foundry's good name has drawn grinding masters. They are inquiring about work."}`);
  }
  G.interseason={
    shamotNeedRepair:furnace.shamotWear>=60,
    shamotCritical:furnace.shamotWear>=80,
    forestRegen:totalRegen,
    reforestBonus,
    runInCarryover:newRunIn,
    seasonScore:calcSeasonScore(),
    candidates
  };
  G.phase="interseason";
  render();
}

function buyBaranOffer(){
  const o=G.baranOffer;
  if(!o||G.grose<o.price)return;
  G.grose-=o.price;
  G.additives[o.item]=(G.additives[o.item]||0)+o.qty;
  // Odemkni recept pokud tento item byl unlock_item
  Object.entries(COLOR_RECIPES).forEach(([key,rec])=>{
    if(rec.unlock_item===o.item&&!G.unlockedRecipes.includes(key)){
      G.unlockedRecipes.push(key);
      G.log.push(`__EVT__📜 ${G.lang==="cs"?"Nový recept odemčen":"New recipe unlocked"}: ${G.lang==="cs"?rec.cs:rec.en}!`);
    }
  });
  G.log.push(`__ECO__🛒 ${G.lang==="cs"?"Koupeno":"Bought"}: ${o.qty}× ${ADDITIVES[o.item]?.icon} ${G.lang==="cs"?ADDITIVES[o.item]?.cs:ADDITIVES[o.item]?.en} (-${o.price}g)`);
  G.baranOffer=null;
  render();
}

function craftColorGlass(recipeKey){
  const rec=COLOR_RECIPES[recipeKey];
  if(!rec||!G.unlockedRecipes.includes(recipeKey))return;
  if(!G.fActive||G.fTemp<rec.furnaceMin){
    G.log.push(`__EVT__❌ ${G.lang==="cs"?"Pec příliš studená":"Furnace too cold"} (min ${rec.furnaceMin}%)`);
    render(); return;
  }
  // Zkontroluj vstupy
  for(const [item,qty] of Object.entries(rec.inputs)){
    const have=(item==="crystal"?G.crystal.length:G.additives[item])||0;
    if(have<qty){
      G.log.push(`__EVT__❌ ${G.lang==="cs"?"Chybí":"Missing"}: ${qty}× ${ADDITIVES[item]?.icon||"✨"} ${G.lang==="cs"?ADDITIVES[item]?.cs||item:ADDITIVES[item]?.en||item}`);
      render(); return;
    }
  }
  // Odečti vstupy
  for(const [item,qty] of Object.entries(rec.inputs)){
    if(item==="crystal") G.crystal.splice(0,qty);
    else G.additives[item]-=qty;
  }
  // Kvalita dle pece + bonus receptu
  const q=Math.min(5,Math.round(calcFurnaceEff(G.furnace,G.panevQuality)*5)+rec.quality_bonus);
  G[rec.output].push(q);
  // Zapsat do archivu pokud poprvé
  const archKey="arch_"+recipeKey;
  if(!G.unlockedRecipes.includes(archKey)){
    G.unlockedRecipes.push(archKey);
    G.log.push(`__EVT__📚 „${rec.latin}"`);
  }
  G.log.push(`__PROD__${rec.icon} ${G.lang==="cs"?rec.cs:rec.en} ${["★","★★","★★★","★★★★","★★★★★"][q-1]}`);
  render();
}

function repairShamot(){
  const cost={clay:4,limestone:2,grose:8};
  if(G.res.clay<cost.clay||G.res.limestone<cost.limestone||G.grose<cost.grose){
    G.log.push(`❌ ${G.lang==="cs"?"Nedostatek surovin pro opravu šamotu":"Not enough materials to repair shamot"}`);
    render(); return;
  }
  G.res.clay-=cost.clay; G.res.limestone-=cost.limestone; G.grose-=cost.grose;
  G.furnace.shamotWear=Math.max(0,G.furnace.shamotWear-70);
  G.log.push(`🧱 ${G.lang==="cs"?"Šamot opraven":"Shamot repaired"} (-${cost.grose}g, -${cost.clay} jíl)`);
  render();
}

function upgradeFurnace(type){
  const cost=UPGRADE_COST[type];
  if(G.furnace.type===type||
     (type==="master"&&G.furnace.type==="primitive")||
     G.res.wood<cost.wood||G.res.limestone<cost.limestone||
     G.res.clay<cost.clay||G.grose<cost.grose){
    return;
  }
  G.res.wood-=cost.wood; G.res.limestone-=cost.limestone;
  G.res.clay-=cost.clay; G.grose-=cost.grose;
  G.furnace.type=type; G.furnace.runIn=Math.round(G.furnace.runIn*0.4); // reset zaběhnutosti
  G.furnace.shamotWear=0;
  G.log.push(`🔥 ${G.lang==="cs"?"Pec vylepšena":"Furnace upgraded"}: ${FURNACE_TYPES[type][G.lang==="cs"?"name":"nameEn"]}`);
  G.showUpgrade=false;
  render();
}

function startNewSeason(){
  const p=G;
  const newSeason=p.season+1;
  const newContracts=freshContracts();

  // Náklady na sklad: 1g za každý kus skla přeneseného do nové sezóny
  const blownStored=BLOWN_TYPES.reduce((s,k)=>s+(p[k]?.length||0),0);
  const groundStored=GROUND_TYPES.reduce((s,k)=>s+(p[k]?.length||0),0);
  const engraveStored=ENGRAVE_INPUTS.reduce((s,k)=>s+(p["rytina_"+k]?.length||0),0);
  const storedItems=p.waldglas.length+p.crystal.length+blownStored+groundStored+engraveStored;
  const storageCost=storedItems*STORAGE_COST_PER_ITEM;
  const newGrose=Math.max(0,p.grose-storageCost);

  // Kronika se přenáší, přidáme hlavičku nové sezóny
  const oldLog=[...p.log];
  oldLog.push(`__SEASON__${newSeason}·${1679+newSeason}`);
  if(storedItems>0){
    oldLog.push(`__ECO__🏭 ${p.lang==="cs"?`Sklad: ${storedItems}× skla přeneseno, náklad ${storageCost}g`:`Storage: ${storedItems}× glass carried over, cost ${storageCost}g`}`);
  }

  Object.assign(G,{
    season:newSeason,
    round:0,
    phase:"playing",
    interseason:null,
    // sklo se přenáší, jen nedozrálé pánve propadají
    waldglas:[...p.waldglas],
    crystal:[...p.crystal],
    // Foukané výrobky přeneseny
    ...Object.fromEntries(BLOWN_TYPES.map(k=>[k,[...(p[k]||[])]])),
    // Broušené a rytiny přeneseny
    ...Object.fromEntries(GROUND_TYPES.map(k=>[k,[...(p[k]||[])]])),
    ...Object.fromEntries(ENGRAVE_INPUTS.map(k=>["rytina_"+k,[...(p["rytina_"+k]||[])]])),
    pAging:[],
    contracts:[], avail:newContracts,
    shop:genShop(),
    morale:clamp(p.morale+5,30,100),
    fActive:false,
    grose:newGrose,
    log:oldLog
  });
  render();
}

function calcSeasonScore(){
  const p=G;
  return{
    waldglas:p.tW*5,
    crystal:p.tC*15,
    quality:p.tQN?Math.round((p.tQS/p.tQN)*10):0,
    contracts:p.done*20,
    grose:Math.round(p.grose*1.5),
    debt:Math.max(0,(50-p.debt)*2),
    morale:Math.round(p.morale*.8),
    forest:p.forest*3,
    furnaceRunIn:Math.round(p.furnace.runIn*.5)
  };
}
function totalScore(sc){return Object.values(sc).reduce((a,b)=>a+b,0);}

// ── AKCE ────────────────────────────────────────────────────
function sellItems(type,n){
  const inv=[...G[type]];if(!inv.length)return;
  const md=MONTH_DATA[G.round];
  if(MARKET_CLOSED[G.round]){
    G.log.push(`__EVT__⛔ ${G.lang==="cs"?md.trh_cs:md.trh_en}`);
    render(); return;
  }
  const cnt=Math.min(n,inv.length);
  inv.sort((a,b)=>b-a);
  const selling=inv.slice(0,cnt),rest=inv.slice(cnt);
  const hasObchodnik=G.workers.some(w=>w.traits?.includes("obchodnik"));
  // Ceny dle typu
  const basePrices={waldglas:3.5,crystal:9,modra:14,smaragd:16,lattimo:22,rubin:50,
    ...Object.fromEntries(Object.entries(BLOWN_ITEMS).map(([k,v])=>[k,v.base])),
    ...Object.fromEntries(Object.entries(GROUND_ITEMS).map(([k,v])=>[k,v.base])),
    ...Object.fromEntries(ENGRAVE_INPUTS.map(k=>{
      const srcBase=GROUND_ITEMS[k]?.base||BLOWN_ITEMS[k]?.base||10;
      return ["rytina_"+k, Math.round(srcBase*ENGRAVE_BONUS)];
    }))};
  const bp=basePrices[type]||3.5;
  const mul=(G.mBonus?1.5:1)*(hasObchodnik?1.1:1);
  const total=selling.reduce((s,q)=>s+Math.round(q*bp*mul),0);
  G[type]=rest; G.grose+=total;
  G.log.push(`💰 ${cnt}× ${type} → ${total}g`);
  render();
}
function buyItem(k){
  const it=G.shop[k];if(!it||it.stock<=0||G.grose<it.price)return;
  it.stock--; G.grose-=it.price; G.res[k]=(G.res[k]||0)+1;
  G.log.push(`🛒 ${k} → -${it.price}g`);
  render();
}
function acceptContract(id){
  const c=G.avail.find(x=>x.id===id);if(!c)return;
  G.contracts.push({...c}); G.avail=G.avail.filter(x=>x.id!==id);
  render();
}
function dismissEvt(){
  if(G.events.length){G.curEvt=G.events.shift();}
  else{G.curEvt=null; G.phase=G.round>=ROUNDS?"interseasonPhase":"summary";}
  render();
}
function setAlloc(key,val){
  const a={...G.wa}; a[key]=clamp(val,0,100);
  const oth=Object.keys(a).filter(k=>k!==key);
  const rem=100-a[key], os=oth.reduce((s,k)=>s+a[k],0);
  if(os>0)oth.forEach(k=>{a[k]=Math.round(a[k]/os*rem);});
  else oth.forEach(k=>{a[k]=Math.round(rem/oth.length);});
  const tot=Object.values(a).reduce((x,y)=>x+y,0);
  if(tot!==100)a[oth[0]]+=100-tot;
  G.wa=a; render();
}

// ════════════════════════════════════════════════════════════
// FURNACE AUDIO ENGINE — integrated from audio_sklarska-pec-v2
// Přepracovaný: méně white noise, organické praskání, reálné pauzy
// ════════════════════════════════════════════════════════════
const FurnaceAudio=(()=>{
  let _ctx=null,_engine=null,_running=false;
  let _volume=0.7,_enabled=true,_temp=0,_phase='off';

  function _tN(){return _temp/100;}

  class Engine{
    constructor(){
      this.master=_ctx.createGain(); this.master.gain.value=_volume;
      this.comp=_ctx.createDynamicsCompressor();
      this.comp.threshold.value=-12; this.comp.ratio.value=3;
      this.comp.attack.value=0.01; this.comp.release.value=0.2;
      this.master.connect(this.comp); this.comp.connect(_ctx.destination);
      this.fireGain=_ctx.createGain(); this.fireGain.gain.value=0.75;
      this.fireGain.connect(this.master);
      // Konvolver — kamenná vyzdívka
      this.echoBus=_ctx.createGain(); this.echoBus.gain.value=0;
      const rL=_ctx.sampleRate*2.5;
      const rB=_ctx.createBuffer(2,rL,_ctx.sampleRate);
      for(let c=0;c<2;c++){const d=rB.getChannelData(c);for(let i=0;i<rL;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/rL,5);}
      this.conv=_ctx.createConvolver(); this.conv.buffer=rB;
      this.echoBus.connect(this.conv); this.conv.connect(this.master);
      this.loops={}; this.intervals=[];
      this.rumbleGain=null; this.rumbleFilter=null;
      this.hissGain=null; this.hissFilter=null;
    }

    start(){
      this._startRumble(); this._startHiss();
      this._scheduleCrackle(); this._scheduleBubble(); this._scheduleMetal();
      this._scheduleDraft();
    }

    stop(){
      this.intervals.forEach(id=>clearInterval(id)); this.intervals=[];
      Object.values(this.loops).forEach(n=>{try{n.stop();}catch(e){}});
      this.loops={};
    }

    setVolume(v){
      if(this.master)this.master.gain.setTargetAtTime(v,_ctx.currentTime,0.2);
    }

    update(){
      if(!_running)return;
      const t=_tN(), now=_ctx.currentTime, isPc=_phase==='campaign';
      // Rumble: tiché v přípravě, silné v kampani
      if(this.rumbleGain){
        const rGain=isPc?t*0.35:t*0.06;
        this.rumbleGain.gain.setTargetAtTime(rGain,now,0.5);
      }
      if(this.rumbleFilter){
        this.rumbleFilter.frequency.setTargetAtTime(28+t*30,now,0.6);
      }
      // Hiss: velmi jemný
      if(this.hissGain){
        this.hissGain.gain.setTargetAtTime(isPc?t*0.012:t*0.004,now,0.4);
      }
      if(this.hissFilter){
        this.hissFilter.frequency.setTargetAtTime(1400+t*1200,now,0.4);
      }
      // Echo — kamenná vyzdívka rezonuje při vyšší teplotě
      const echoE=t>0.2?Math.min(1,(t-0.2)*1.1):0;
      this.echoBus.gain.setTargetAtTime(isPc?echoE*0.7:0,now,0.6);
    }

    // Brownian noise — sub-bass tělo pece
    _startRumble(){
      const sr=_ctx.sampleRate, bL=sr*3;
      const buf=_ctx.createBuffer(1,bL,sr);
      const d=buf.getChannelData(0); let last=0;
      for(let i=0;i<bL;i++){
        const w=Math.random()*2-1;
        d[i]=(last+(0.018*w))/1.018; last=d[i]; d[i]*=3.2;
      }
      const src=_ctx.createBufferSource(); src.buffer=buf; src.loop=true;
      this.rumbleFilter=_ctx.createBiquadFilter();
      this.rumbleFilter.type='lowpass'; this.rumbleFilter.frequency.value=35;
      this.rumbleGain=_ctx.createGain(); this.rumbleGain.gain.value=0;
      src.connect(this.rumbleFilter); this.rumbleFilter.connect(this.rumbleGain);
      this.rumbleGain.connect(this.fireGain); src.start();
      this.loops.rumble=src;
    }

    // Jemný brownian hiss — povrchová textura ohně
    _startHiss(){
      const sr=_ctx.sampleRate, bL=sr*2;
      const buf=_ctx.createBuffer(1,bL,sr);
      const d=buf.getChannelData(0); let last=0;
      for(let i=0;i<bL;i++){
        const w=Math.random()*2-1;
        d[i]=(last+(0.018*w))/1.018; last=d[i];
      }
      const src=_ctx.createBufferSource(); src.buffer=buf; src.loop=true;
      this.hissFilter=_ctx.createBiquadFilter();
      this.hissFilter.type='bandpass'; this.hissFilter.frequency.value=1600; this.hissFilter.Q.value=0.5;
      this.hissGain=_ctx.createGain(); this.hissGain.gain.value=0;
      src.connect(this.hissFilter); this.hissFilter.connect(this.hissGain);
      this.hissGain.connect(this.fireGain); src.start();
      this.loops.hiss=src;
    }

    // Praskání: stochastické skupiny s reálnými pauzami
    _scheduleCrackle(){
      const tick=()=>{
        if(!_running)return;
        const t=_tN(), isPc=_phase==='campaign';
        const crackleE=t>0.1?Math.min(1,(t-0.1)*1.4):0;
        // Tiché pauzy — realita: oheň není nepřetržitý
        const prob=isPc?0.25+crackleE*0.45:crackleE*0.1;
        if(Math.random()<prob){
          const now=_ctx.currentTime;
          const type=Math.random()>0.45?'sharp':'deep';
          this._crack(type,now+Math.random()*0.1,crackleE);
          // Skupina 2–3 prasků
          if(Math.random()<0.4){
            this._crack(Math.random()>0.5?'sharp':'deep',now+0.09+Math.random()*0.1,crackleE);
            if(Math.random()<0.3){
              this._crack('sharp',now+0.22+Math.random()*0.12,crackleE*0.7);
            }
          }
        }
        // Variabilní interval: 1.2–5s — reálné pauzy
        const next=1200+Math.random()*3800+(1-crackleE)*1500;
        this.intervals.push(setTimeout(tick,next));
      };
      this.intervals.push(setTimeout(tick,800+Math.random()*1200));
    }

    _crack(type,time,energy){
      const bS=_ctx.sampleRate*0.18;
      const buf=_ctx.createBuffer(1,bS,_ctx.sampleRate);
      const d=buf.getChannelData(0);
      const decay=type==='sharp'?35+Math.random()*25:6+Math.random()*4;
      for(let i=0;i<bS;i++)d[i]=(Math.random()*2-1)*Math.exp(-(i/bS)*decay);
      const src=_ctx.createBufferSource(); src.buffer=buf;
      const flt=_ctx.createBiquadFilter(); flt.type='bandpass';
      if(type==='sharp'){flt.frequency.value=2200+Math.random()*3500+_tN()*1200;flt.Q.value=0.9+Math.random();}
      else{flt.frequency.value=100+Math.random()*180;flt.Q.value=0.4+Math.random()*0.4;}
      const soft=_ctx.createBiquadFilter(); soft.type='lowpass';
      soft.frequency.value=4500+_tN()*1800;
      const g=_ctx.createGain();
      const vol=(type==='sharp'?0.2:0.35)*energy+Math.random()*0.08;
      g.gain.value=vol;
      src.connect(flt);flt.connect(soft);soft.connect(g);g.connect(this.fireGain);
      if(vol>0.3){const s=_ctx.createGain();s.gain.value=vol*0.5;g.connect(s);s.connect(this.echoBus);}
      src.start(time);
    }

    // Draft — pomalý průvan pecí (příprava i kampaň)
    _scheduleDraft(){
      const tick=()=>{
        if(!_running)return;
        const t=_tN(), breathE=t>0.15?Math.min(1,(t-0.15)*0.9):0;
        if(breathE>0.05&&Math.random()<0.3+breathE*0.2){
          const now=_ctx.currentTime;
          const dur=2.5+Math.random()*3.5;
          const bS=_ctx.sampleRate*dur;
          const buf=_ctx.createBuffer(1,bS,_ctx.sampleRate);
          const d=buf.getChannelData(0);let last=0;
          for(let i=0;i<bS;i++){const w=Math.random()*2-1;d[i]=(last+(0.015*w))/1.015;last=d[i];}
          const src=_ctx.createBufferSource();src.buffer=buf;
          const flt=_ctx.createBiquadFilter();flt.type='bandpass';
          flt.frequency.value=600+Math.random()*800+_tN()*600;flt.Q.value=0.3;
          const g=_ctx.createGain();
          const pk=0.008+breathE*0.012;
          g.gain.setValueAtTime(0,now);
          g.gain.linearRampToValueAtTime(pk,now+dur*0.35);
          g.gain.exponentialRampToValueAtTime(0.0001,now+dur);
          src.connect(flt);flt.connect(g);g.connect(this.fireGain);
          g.connect(this.echoBus);
          src.start(now);
        }
        this.intervals.push(setTimeout(tick,3000+Math.random()*5000));
      };
      this.intervals.push(setTimeout(tick,1500));
    }

    // Bublání skloviny — jen při vysoké teplotě
    _scheduleBubble(){
      const id=setInterval(()=>{
        if(!_running||_phase!=='campaign')return;
        const bubE=_tN()>0.5?Math.min(1,(_tN()-0.5)*2.5):0;
        if(bubE<0.05||Math.random()>bubE*0.4)return;
        const now=_ctx.currentTime;
        const freq=160+Math.random()*300+_tN()*180;
        const dur=0.05+Math.random()*0.1;
        const osc=_ctx.createOscillator();osc.type='sine';
        osc.frequency.setValueAtTime(freq,now);
        osc.frequency.exponentialRampToValueAtTime(freq*0.3,now+dur);
        const g=_ctx.createGain();
        g.gain.setValueAtTime(bubE*0.04,now);
        g.gain.exponentialRampToValueAtTime(0.001,now+dur);
        osc.connect(g);g.connect(this.fireGain);
        osc.start(now);osc.stop(now+dur+0.01);
      },300+Math.random()*400);
      this.intervals.push(id);
    }

    // Kovové zvuky — nástroje, kleště, pánev
    _scheduleMetal(){
      const id=setInterval(()=>{
        if(!_running||_phase!=='campaign')return;
        const metE=_tN()>0.7?Math.min(1,(_tN()-0.7)*3.5):0;
        if(metE<0.05||Math.random()>metE*0.2)return;
        const now=_ctx.currentTime;
        const freq=600+Math.random()*1600;
        const dur=0.15+Math.random()*0.35;
        [1,2.76,5.4].forEach((mult,i)=>{
          const osc=_ctx.createOscillator();osc.type='sine';
          osc.frequency.value=freq*mult;
          const g=_ctx.createGain();
          const d=dur/(1+i*1.2);
          g.gain.setValueAtTime(metE*0.025/(i+1),now);
          g.gain.exponentialRampToValueAtTime(0.001,now+d);
          osc.connect(g);g.connect(this.fireGain);
          const s=_ctx.createGain();s.gain.value=0.35;
          g.connect(s);s.connect(this.echoBus);
          osc.start(now);osc.stop(now+d+0.01);
        });
      },900+Math.random()*800);
      this.intervals.push(id);
    }
  }

  // Public API
  function _ensureCtx(){
    if(!_ctx){
      const AC=window.AudioContext||window.webkitAudioContext;
      if(!AC)return false;
      _ctx=new AC({latencyHint:'interactive'});
    }
    if(_ctx.state==='suspended')_ctx.resume();
    return true;
  }

  return{
    setEnabled(v){
      _enabled=v;
      if(!v&&_running){this.stop();}
    },
    setVolume(v){
      _volume=clamp(v,0,1);
      if(_engine)_engine.setVolume(_volume);
    },
    setTemp(t){
      _temp=clamp(t,0,100);
      if(_engine)_engine.update();
    },
    setPhase(ph){
      // ph: 'off'|'prep'|'campaign'
      const wasOff=_phase==='off';
      _phase=ph;
      if(ph==='off'){this.stop();return;}
      if(!_enabled)return;
      if(!_running){
        if(!_ensureCtx())return;
        _engine=new Engine(); _engine.start(); _running=true;
      }
      if(_engine)_engine.update();
    },
    stop(){
      if(_engine){_engine.stop();_engine=null;}
      _running=false;
    },
    get enabled(){return _enabled;},
    get volume(){return _volume;}
  };
})();

function h(tag,attrs,...kids){
  const el=document.createElement(tag);

    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);

  // ── TAB: PEC ──
  }else if(p.tab==="furnace"){

        onClick:()=>{
          const data=JSON.stringify(G,null,2);
          const blob=new Blob([data],{type:"application/json"});
          const url=URL.createObjectURL(blob);
          const a=document.createElement("a");
          a.href=url;
          a.download=`sklarska-hut-s${G.season}-r${G.round}-${Date.now()}.json`;
          a.click();
          URL.revokeObjectURL(url);
        }},L==="cs"?"💾 Uložit":"💾 Save"));
    saveSec.append(saveRow);

    // Uložit do localStorage
    const lsRow=h("div",{class:"settings-row"});
    const lsSaved=localStorage.getItem("sh_v9");
    const lsDate=lsSaved?new Date(JSON.parse(lsSaved)._savedAt||0).toLocaleString("cs-CZ"):null;
    lsRow.append(
      h("span",{class:"settings-label"},
        L==="cs"?"Rychlé uložení (prohlížeč)":"Quick save (browser)",
        lsDate?h("div",{style:{fontSize:"9px",color:"#8b5e34"}},`${L==="cs"?"Uloženo":"Saved"}: ${lsDate}`):""),
      h("button",{class:"btn btn-s",
        onClick:()=>{
          const save={...G,_savedAt:Date.now()};
          localStorage.setItem("sh_v9",JSON.stringify(save));
          G.log.push(`__ECO__💾 ${L==="cs"?"Hra uložena do prohlížeče":"Game saved to browser"}`);
          render();
        }},L==="cs"?"📌 Quick save":"📌 Quick save"));
    saveSec.append(lsRow);

    // Načíst z localStorage
    if(lsSaved){
      const lsLoadRow=h("div",{class:"settings-row"});
      lsLoadRow.append(
        h("span",{class:"settings-label"},L==="cs"?"Načíst quick save":"Load quick save"),
        h("button",{class:"btn btn-s",
          onClick:()=>{
            try{
              const saved=JSON.parse(localStorage.getItem("sh_v9"));
              if(saved){Object.assign(G,saved);render();}
            }catch(e){alert(L==="cs"?"Chyba načtení":"Load error");}
          }},L==="cs"?"📂 Načíst":"📂 Load"));
      saveSec.append(lsLoadRow);
    }

    // Načíst ze souboru
    const fileRow=h("div",{class:"settings-row"});
    const fileInput=h("input",{type:"file",accept:".json",style:{display:"none"},
      onChange:e=>{
        const file=e.target.files[0];if(!file)return;
        const reader=new FileReader();
        reader.onload=ev=>{
          try{
            const saved=JSON.parse(ev.target.result);
            if(saved&&saved.season){Object.assign(G,saved);render();}
            else alert(L==="cs"?"Neplatný soubor":"Invalid file");
          }catch(err){alert(L==="cs"?"Chyba čtení souboru":"File read error");}
        };
        reader.readAsText(file);
      }});
    fileRow.append(
      h("span",{class:"settings-label"},L==="cs"?"Načíst ze souboru (.json)":"Load from file (.json)"),
      fileInput,
      h("button",{class:"btn btn-s",onClick:()=>fileInput.click()},L==="cs"?"📂 Otevřít":"📂 Open"));
    saveSec.append(fileRow);

    // Reset
    const resetRow=h("div",{class:"settings-row"});
    resetRow.append(
      h("span",{class:"settings-label",style:{color:"#a03020"}},L==="cs"?"Nová hra (smaže vše!)":"New game (deletes everything!)"),
      h("button",{class:"btn btn-s btn-danger",
        onClick:()=>{
          if(confirm(L==="cs"?"Opravdu začít novou hru? Vše bude smazáno.":"Start new game? All progress will be lost.")){

            G=initState();G.huteName=name;G.phase="intro";render();

    saveSec.append(resetRow);
    content.append(saveSec);

    // Zvuk
    const aSec=h("div",{class:"sec"});
    aSec.append(h("div",{class:"sec-title"},"🔊 "+(L==="cs"?"Zvuk":"Audio")));

    const toggleRow=h("div",{class:"settings-row"});

      h("span",{class:"settings-label"},L==="cs"?"Zvuk pece":"Furnace sound"),

        class:"btn btn-s"+(p.audio.enabled?" btn-active":""),

    // Jazyk

      lRow.append(h("button",{
        class:"btn btn-s"+(p.lang===lang?" btn-active":""),
        onClick:()=>{G.lang=lang;render();}},
        lang==="cs"?"🇨🇿 Čeština":"🇬🇧 English"));
    });
    lSec.append(lRow);
    content.append(lSec);

    // Info — O hře
    const iSec=h("div",{class:"sec"});
    iSec.append(
      h("div",{class:"sec-title"},L==="cs"?"O hře":"About"),
      // Verze a popis
      h("div",{style:{fontSize:"11px",color:"#8b5e34",lineHeight:"1.8",marginBottom:"8px"}},
        h("strong",{style:{color:"#3a2a14",fontSize:"13px"}},"Sklářská Huť · v4.2"),h("br",null),
        h("em",null,"Haida, Arnsdorf, Blottendorf · Novoborsko · Anno Domini 1680"),h("br",null),
        L==="cs"
          ?"Historická resource management hra zasazená do světa lesních sklářských hutí 17. století v severních Čechách."
